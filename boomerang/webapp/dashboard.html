<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>🪃 Boomerang AI — Painel</title>
<style>
  :root{--bg:#0b1020;--card:#151c33;--ln:#243049;--tx:#e6ebf5;--mut:#8a95ad;--g:#39d98a;--r:#ff5c7c;--ac:#4d8bff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--tx);font:14px/1.5 system-ui,Segoe UI,Arial;padding:18px;max-width:920px;margin:auto}
  h1{font-size:20px;margin-bottom:2px} .sub{color:var(--mut);font-size:12px;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--ln);border-radius:12px;padding:14px}
  .card .lbl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .card .val{font-size:22px;font-weight:700;margin-top:4px}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:#1d2640;border:1px solid var(--ln)}
  .sec{background:var(--card);border:1px solid var(--ln);border-radius:12px;padding:14px;margin-bottom:14px}
  .sec h2{font-size:14px;margin-bottom:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
  table{width:100%;border-collapse:collapse;font-size:13px} th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--ln)}
  th{color:var(--mut);font-weight:600} a{color:var(--ac);text-decoration:none} a:hover{text-decoration:underline}
  .pos{color:var(--g)} .neg{color:var(--r)} .mut{color:var(--mut)}
  .pill{font-size:11px;padding:2px 8px;border-radius:6px;background:#1d2640}
</style></head>
<body>
  <h1>🪃 Boomerang AI <span id="state" class="badge">—</span></h1>
  <div class="sub">Painel só-leitura · atualiza a cada 5s · verificação on-chain via BscScan</div>

  <div class="grid">
    <div class="card"><div class="lbl">Patrimônio</div><div class="val" id="equity">—</div></div>
    <div class="card"><div class="lbl">Drawdown</div><div class="val" id="dd">—</div></div>
    <div class="card"><div class="lbl">Pico</div><div class="val" id="peak">—</div></div>
    <div class="card"><div class="lbl">Stop / Modo</div><div class="val" id="risk">—</div></div>
  </div>

  <div class="sec"><h2>Carteira do agente</h2><div id="wallet" class="mut">—</div>
    <div class="mut" style="margin-top:6px">Foco: <span id="focus">—</span></div></div>

  <div class="sec"><h2>Composição da carteira <span id="walletTotal" class="mut" style="text-transform:none;font-weight:400"></span></h2>
    <div id="holdings"><span class="mut">lendo on-chain…</span></div></div>

  <div class="sec"><h2>Posições abertas</h2><div id="positions"><span class="mut">nenhuma</span></div></div>

  <div class="sec"><h2>Histórico de trades</h2><div id="trades"><span class="mut">—</span></div></div>

<script>
const KEY = new URLSearchParams(location.search).get("key") || "";
const SCAN = "https://bscscan.com";
const usd = v => (v==null?"—":"$"+Number(v).toFixed(2));
const short = a => a? a.slice(0,6)+"…"+a.slice(-4):"—";
const qty = v => { v=Number(v); if(!isFinite(v)) return "—";
  if(v>=1000) return v.toLocaleString("en-US",{maximumFractionDigits:2});
  if(v>=1) return v.toFixed(4); if(v>=0.0001) return v.toFixed(6); return v.toExponential(2); };
const price = v => { v=Number(v); if(!isFinite(v)) return "—";
  return "$"+(v>=1?v.toFixed(2):v>=0.01?v.toFixed(4):v.toExponential(2)); };
const KIND = {gas:["BNB (gás)","#f0b90b"],stable:["estável","#4d8bff"],token:["token","#39d98a"]};

async function loadWallet(){
  try{
    const w = await (await fetch(`/api/wallet?key=${KEY}`)).json();
    const h = w.holdings||[];
    document.getElementById("walletTotal").textContent =
      w.total_usd!=null ? "· total on-chain "+usd(w.total_usd) : "";
    if(!h.length){
      document.getElementById("holdings").innerHTML = w.error
        ? `<span class="mut">indisponível (${w.error})</span>`
        : `<span class="mut">sem saldo on-chain</span>`;
      return;
    }
    document.getElementById("holdings").innerHTML =
      `<table><tr><th>Moeda</th><th>Quantidade</th><th>Preço</th><th>Valor</th><th>% carteira</th></tr>`+
      h.map(x=>{
        const k=KIND[x.kind]||["",""];
        return `<tr><td><b>${x.symbol}</b> <span class="pill" style="color:${k[1]}">${k[0]}</span></td>`+
          `<td>${qty(x.balance)}</td><td>${price(x.price_usd)}</td>`+
          `<td>${usd(x.value_usd)}</td>`+
          `<td><span class="mut">${(x.pct||0).toFixed(1)}%</span></td></tr>`;
      }).join("")+`</table>`;
  }catch(e){ document.getElementById("holdings").innerHTML=`<span class="mut">offline</span>`; }
}

async function tick(){
  try{
    const s = await (await fetch(`/api/status?key=${KEY}`)).json();
    const t = await (await fetch(`/api/trades?key=${KEY}`)).json();
    if(s.error){document.getElementById("state").textContent="sem acesso";return;}

    document.getElementById("state").textContent = s.state||"—";
    document.getElementById("equity").textContent = usd(s.equity_usd);
    const dd = s.drawdown_pct||0;
    const ddEl=document.getElementById("dd"); ddEl.textContent = dd.toFixed(1)+"%";
    ddEl.className="val "+(dd>=20?"neg":dd>=10?"":"pos");
    document.getElementById("peak").textContent = usd(s.peak_equity);
    document.getElementById("risk").textContent = (s.stop_loss_pct??"—")+"% · "+(s.mode||"—");
    document.getElementById("focus").textContent = (s.token_focus||[]).join(", ")||"—";

    const addr=s.agent_address;
    document.getElementById("wallet").innerHTML = addr
      ? `<a href="${SCAN}/address/${addr}" target="_blank">${addr}</a> ↗`
      : "—";

    const pos=s.positions||[];
    document.getElementById("positions").innerHTML = pos.length
      ? `<table><tr><th>Token</th><th>Entrada</th><th>Valor</th><th>Stop</th></tr>`+
        pos.map(p=>`<tr><td>${p.symbol}</td><td>${Number(p.entry_price).toPrecision?Number(p.entry_price).toPrecision(6):p.entry_price}</td><td>${usd(p.amount_usd)}</td><td>${Number(p.stop_loss_price).toPrecision(6)}</td></tr>`).join("")+`</table>`
      : `<span class="mut">nenhuma</span>`;

    const rows=[...t].reverse().slice(0,30).map(x=>{
      const tx=x.tx?`<a href="${SCAN}/tx/${x.tx}" target="_blank">ver ↗</a>`:`<span class="mut">—</span>`;
      const tipo=x.type==="open"?`<span class="pill">COMPRA</span>`:`<span class="pill">VENDA</span>`;
      const pnl=x.pnl_pct!=null?`<span class="${x.pnl_pct>=0?'pos':'neg'}">${x.pnl_pct>=0?'+':''}${x.pnl_pct.toFixed(2)}%</span>`:"";
      return `<tr><td>${tipo}</td><td>${x.symbol}</td><td>${x.type==='open'?usd(x.amount_usd):pnl}</td><td>${tx}</td></tr>`;
    }).join("");
    document.getElementById("trades").innerHTML = rows
      ? `<table><tr><th>Tipo</th><th>Token</th><th>Valor/PnL</th><th>Tx</th></tr>${rows}</table>`
      : `<span class="mut">nenhum trade ainda</span>`;
  }catch(e){ document.getElementById("state").textContent="offline"; }
}
tick(); setInterval(tick,5000);
loadWallet(); setInterval(loadWallet,30000);
</script>
</body></html>
