name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.17 pytest==9.0.3

      - name: Lint (ruff)
        run: ruff check boomerang/ tests/

      - name: Test (pytest)
        run: pytest tests/ -q
